name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger deploy
        id: trigger
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered deploy: $DEPLOY_ID"

      - name: Wait for deploy to go live
        run: |
          DEPLOY_ID="${{ steps.trigger.outputs.deploy_id }}"
          FAILED_STATUSES="deactivated build_failed update_failed canceled"

          for i in $(seq 1 40); do
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "[$i/40] status: $STATUS"

            if [ "$STATUS" = "live" ]; then
              echo "Deploy succeeded."
              exit 0
            fi

            for fs in $FAILED_STATUSES; do
              if [ "$STATUS" = "$fs" ]; then
                echo "Deploy failed with status: $STATUS"
                exit 1
              fi
            done

            sleep 15
          done

          echo "Deploy timed out (10 min)."
          exit 1
